name: CI/CD Pipeline - iComers

on:
  push:
    branches: [main]

jobs:
  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk to check for vulnerabilities
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: snyk
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/icomers-api:latest

  deploy-simulado:
    name: Despliegue en Entorno Simulado
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Levantar entorno con Docker Compose
        run: docker compose up -d --build

      - name: Esperar que la app esté lista
        run: |
          echo "Esperando 60s para que MySQL y Spring Boot inicien..."
          sleep 60

      - name: Verificar contenedores corriendo
        run: docker compose ps

      - name: Health check de la API
        run: curl --fail http://localhost:8080/actuator/health

      - name: Probar endpoint de categorias
        run: curl --fail http://localhost:8080/api/categorias

      - name: Apagar y limpiar el entorno
        if: always()
        run: docker compose down -v
