name: CI/CD Pipeline - iComers

on:
  push:
    branches: [main]

jobs:
  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: snyk
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/icomers-api:latest

      - name: Docker Setup Buildx
        # You may pin to the exact commit or the version.
        # uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
        uses: docker/setup-buildx-action@v4.0.0
        with:
          # Buildx version. (eg. v0.3.0)
          version: # optional
          # Sets the builder driver to be used
          driver: # optional, default is docker-container
          # List of additional driver-specific options. (eg. image=moby/buildkit:master)
          driver-opts: # optional
          # BuildKit daemon flags
          buildkitd-flags: # optional
          # BuildKit daemon config file
          buildkitd-config: # optional
          # Inline BuildKit daemon config
          buildkitd-config-inline: # optional
          # Switch to this builder instance
          use: # optional, default is true
          # Name of the builder. If not specified, one will be generated or if it already exists, it will be used instead of creating a new one.
          name: # optional
          # Optional address for docker socket or context from `docker context ls`
          endpoint: # optional
          # Fixed platforms for current node. If not empty, values take priority over the detected ones
          platforms: # optional
          # Append additional nodes to the builder
          append: # optional
          # Keep BuildKit state on cleanup. This is only useful on persistent self-hosted runners.
          keep-state: # optional, default is false
          # Cache buildx binary to GitHub Actions cache backend
          cache-binary: # optional, default is true
          # Cleanup temp files and remove builder at the end of a job
          cleanup: # optional, default is true

  test-entorno-simulado:
    name: Despliegue en Entorno Simulado
    runs-on: ubuntu-latest
    needs: build-and-push 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Levantar entorno con Docker Compose
        run: |
          docker-compose up -d
          
          sleep 15 

      - name: Verificar que los contenedores están corriendo
        run: docker ps

      - name: Probar conexión a la API (Ejemplo)

        run: |
          curl -v http://localhost:8080/api/v1/categoria

      - name: Apagar y limpiar el entorno
        if: always()
        run: docker-compose down